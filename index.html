<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCPL - NORTHEAST CRICKET PREMIER LEAGUE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:linear-gradient(135deg,#0f172a,#020617);color:white}
section{padding:60px 8%}
h1,h2{text-align:center}
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;margin-bottom:20px}
input,button{padding:10px;border-radius:8px;border:none;margin-top:8px}
input{width:100%;background:#0f172a;border:1px solid #334155;color:white}
button{background:#38bdf8;color:black;font-weight:600;cursor:pointer}
.hero{padding:100px 10%;text-align:center;background:radial-gradient(circle,#1e3a8a,#0f172a)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);
display:flex;justify-content:center;align-items:center;z-index:999}
.hidden{display:none!important}
.close{position:absolute;top:15px;right:20px;font-size:28px;cursor:pointer}
.badge{background:#16a34a;padding:5px 8px;border-radius:6px;font-size:12px}
</style>
</head>
<body>

<div class="hero">
<h1>🏏 NCPL 2026</h1>
<p>Official Cricket Trials Platform</p>
<button onclick="scrollToForm()">Register Now</button>
</div>

<section id="registerSection">
<h2>Player Registration</h2>

<div class="card">
<p>Total Registrations: <span id="regCount">0</span></p>
<p id="entryStatus">Entries Open</p>
</div>

<div class="card">
<form id="regForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="number" id="age" placeholder="Age" required>
<input type="tel" id="mobile" placeholder="Mobile Number" maxlength="10" required>

<label>Upload Photo</label>
<input type="file" id="photo" accept="image/*" required>
<img id="photoPreview" style="width:100px;margin-top:10px;display:none;border-radius:50%;">

<label>Upload Payment Screenshot</label>
<input type="file" id="screenshot" accept="image/*" required>
<img id="shotPreview" style="width:120px;margin-top:10px;display:none;border-radius:8px;">

<button type="submit">Submit Registration</button>
</form>
<p id="formMsg"></p>
</div>
</section>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="modal hidden">
<div class="card" style="width:95%;max-height:90vh;overflow:auto;position:relative;">
<span class="close" onclick="closeAdmin()">×</span>

<h2>Admin Login</h2>
<div id="loginBox">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<div id="adminContent" class="hidden">
<button onclick="toggleEntry()">Toggle Entry</button>
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="resetAll()">Reset All</button>
<div id="adminList"></div>
</div>
</div>
</div>

<!-- ID CARD -->
<div id="idCardModal" class="modal hidden">
<div class="card" style="width:320px;text-align:center;position:relative;">
<span class="close" onclick="closeID()">×</span>

<div id="idCardDesign" style="background:#1e40af;padding:20px;border-radius:20px;">
<h3>🏏 NCPL 2026</h3>
<img id="idPhoto" style="width:90px;height:90px;border-radius:50%;border:3px solid #38bdf8;object-fit:cover;">
<h2 id="idName"></h2>
<p id="idPlayerID"></p>
<p id="idMobile"></p>
<div id="verifiedBadge" class="badge hidden">✔ VERIFIED</div>
<div id="qrCode"></div>
</div>

<br>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let data = JSON.parse(localStorage.getItem("ncplData")) || [];
let entryOpen = true;

function saveData(){
localStorage.setItem("ncplData", JSON.stringify(data));
regCount.innerText = data.length;
}
saveData();

/* PREVIEW */
photo.onchange=e=>{
let r=new FileReader();
r.onload=()=>{photoPreview.src=r.result;photoPreview.style.display="block";}
r.readAsDataURL(e.target.files[0]);
};

screenshot.onchange=e=>{
let r=new FileReader();
r.onload=()=>{shotPreview.src=r.result;shotPreview.style.display="block";}
r.readAsDataURL(e.target.files[0]);
};

/* REGISTER */
regForm.onsubmit=e=>{
e.preventDefault();
if(!entryOpen){formMsg.innerText="Entries Closed";return;}

let player={
id:Date.now(),
playerID:"NCPL-"+Math.floor(1000+Math.random()*9000),
name:name.value,
age:age.value,
mobile:mobile.value,
photo:photoPreview.src,
screenshot:shotPreview.src,
status:"Pending",
verified:false
};

data.push(player);
saveData();
formMsg.innerHTML="<span style='color:lightgreen'>Registration Successful ✅</span>";
regForm.reset();
photoPreview.style.display="none";
shotPreview.style.display="none";
};

/* ADMIN OPEN */
if(window.location.hash==="#ncpladmin"){
adminPanel.classList.remove("hidden");
}

function closeAdmin(){adminPanel.classList.add("hidden");}

function adminLogin(){
if(adminPass.value==="admin2026"){
loginBox.classList.add("hidden");
adminContent.classList.remove("hidden");
loadAdmin();
}
}

function loadAdmin(){
adminList.innerHTML="";
data.forEach(p=>{
adminList.innerHTML+=`
<div class="card">
<p><b>${p.name}</b> - ${p.status}</p>
<button onclick="approve(${p.id})">Approve</button>
<button onclick="showID(${p.id})">Open ID</button>
</div>`;
});
}

function approve(id){
data=data.map(p=>{
if(p.id===id){
p.status="Approved";
let msg="Congratulations "+p.name+"! Your NCPL ID Approved. ID: "+p.playerID;
window.open("https://wa.me/91"+p.mobile+"?text="+encodeURIComponent(msg));
}
return p;
});
saveData();
loadAdmin();
}

function showID(id){
let p=data.find(x=>x.id===id);
if(!p)return;
idCardModal.classList.remove("hidden");
idPhoto.src=p.photo;
idName.innerText=p.name;
idPlayerID.innerText=p.playerID;
idMobile.innerText=p.mobile;

qrCode.innerHTML="";
let link=window.location.origin+window.location.pathname+"?verify="+p.playerID;
new QRCode(qrCode,{text:link,width:80,height:80});
}

function closeID(){idCardModal.classList.add("hidden");}

function downloadPNG(){
html2canvas(idCardDesign,{scale:3}).then(canvas=>{
let a=document.createElement("a");
a.download="NCPL_ID.png";
a.href=canvas.toDataURL();
a.click();
});
}

function downloadPDF(){
let {jsPDF}=window.jspdf;
html2canvas(idCardDesign,{scale:3}).then(canvas=>{
let img=canvas.toDataURL("image/png");
let pdf=new jsPDF();
pdf.addImage(img,"PNG",10,10,180,100);
pdf.save("NCPL_ID.pdf");
});
}

function downloadCSV(){
let csv="Name,Mobile,Status\n";
data.forEach(p=>csv+=`${p.name},${p.mobile},${p.status}\n`);
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="NCPL_Data.csv";
a.click();
}

function toggleEntry(){
entryOpen=!entryOpen;
entryStatus.innerText=entryOpen?"Entries Open":"Entries Closed";
}

function resetAll(){
localStorage.removeItem("ncplData");
data=[];
saveData();
loadAdmin();
}

function scrollToForm(){
registerSection.scrollIntoView({behavior:"smooth"});
}

/* SAFE VERIFY */
window.addEventListener("DOMContentLoaded",function(){
let params=new URLSearchParams(window.location.search);
let verify=params.get("verify");
if(verify){
let p=data.find(x=>x.playerID===verify);
document.body.innerHTML=p?
`<div style="padding:50px;text-align:center">
<h2>NCPL Verification</h2>
<h3>${p.name}</h3>
<p>Status: ${p.status}</p>
</div>`
:`<h2 style="color:red;text-align:center;padding:50px">Invalid / Fake ID</h2>`;
}
});

</script>
</body>
  </html>
